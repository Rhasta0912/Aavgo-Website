name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy/admin
          mkdir -p deploy/user
          mkdir -p deploy/api/admin-hours
          mkdir -p deploy/auth/discord/login
          mkdir -p deploy/auth/discord/callback
          mkdir -p deploy/auth/logout

          cp index.html deploy/index.html
          cp styles.css deploy/styles.css
          cp script.js deploy/script.js
          cp admin/index.php deploy/admin/index.php
          cp user/index.php deploy/user/index.php
          cp api/admin-hours/index.php deploy/api/admin-hours/index.php
          cp auth/bootstrap.php deploy/auth/bootstrap.php
          cp auth/discord/login/index.php deploy/auth/discord/login/index.php
          cp auth/discord/callback/index.php deploy/auth/discord/callback/index.php
          cp auth/logout/index.php deploy/auth/logout/index.php
          printf "sha=%s\nbuilt_at=%s\n" "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > deploy/_aavgo_deploy.txt

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload site to cPanel
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          CPANEL_FTP_PORT: ${{ secrets.CPANEL_FTP_PORT }}
          CPANEL_FTP_PATH: ${{ secrets.CPANEL_FTP_PATH }}
        run: |
          test -n "$CPANEL_FTP_HOST"
          test -n "$CPANEL_FTP_USERNAME"
          test -n "$CPANEL_FTP_PASSWORD"
          test -n "$CPANEL_FTP_PORT"
          test -n "$CPANEL_FTP_PATH"

          DEPLOY_ROOT="$CPANEL_FTP_PATH"
          DEPLOY_ROOT="${DEPLOY_ROOT#\"}"
          DEPLOY_ROOT="${DEPLOY_ROOT%\"}"
          DEPLOY_ROOT="${DEPLOY_ROOT#\'}"
          DEPLOY_ROOT="${DEPLOY_ROOT%\'}"
          DEPLOY_ROOT="${DEPLOY_ROOT%/}"
          if [ -z "$DEPLOY_ROOT" ]; then
            DEPLOY_ROOT="/"
          fi

          BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          TARGETS="$DEPLOY_ROOT"
          for EXTRA in public_html /public_html aavgodesk.xyz /aavgodesk.xyz public_html/aavgodesk.xyz /public_html/aavgodesk.xyz www.aavgodesk.xyz /www.aavgodesk.xyz public_html/www.aavgodesk.xyz /public_html/www.aavgodesk.xyz; do
            case " $TARGETS " in
              *" $EXTRA "*) ;;
              *) TARGETS="$TARGETS $EXTRA" ;;
            esac
          done

          DEPLOYED_ANY="false"
          for TARGET in $TARGETS; do
            if [ "$TARGET" = "/" ]; then
              EXISTS="true"
            else
              if lftp -u "$CPANEL_FTP_USERNAME","$CPANEL_FTP_PASSWORD" -p "$CPANEL_FTP_PORT" "$CPANEL_FTP_HOST" -e "
              set cmd:fail-exit yes
              set ftp:ssl-force true
              set ftp:ssl-protect-data true
              set ssl:verify-certificate no
              cls -d \"$TARGET\"
              bye
              "
              then
                EXISTS="true"
              else
                EXISTS="false"
              fi
            fi

            if [ "$EXISTS" = "true" ]; then
              TARGET_SLUG="$(printf '%s' "$TARGET" | sed 's#[^A-Za-z0-9._-]#_#g')"
              if [ -z "$TARGET_SLUG" ] || [ "$TARGET_SLUG" = "_" ]; then
                TARGET_SLUG="root"
              fi
              printf "sha=%s\nbuilt_at=%s\ntarget=%s\n" "$GITHUB_SHA" "$BUILT_AT" "$TARGET" > deploy/_aavgo_target.txt

              lftp -u "$CPANEL_FTP_USERNAME","$CPANEL_FTP_PASSWORD" -p "$CPANEL_FTP_PORT" "$CPANEL_FTP_HOST" -e "
              set cmd:fail-exit yes
              set ftp:ssl-force true
              set ftp:ssl-protect-data true
              set ssl:verify-certificate no
              mirror -R --verbose deploy/ \"$TARGET\"
              put -O \"$TARGET\" -o _aavgo_target_${TARGET_SLUG}.txt deploy/_aavgo_target.txt
              put -O \"$TARGET\" -o _aavgo_target.txt deploy/_aavgo_target.txt
              bye
              "
              DEPLOYED_ANY="true"
            fi
          done

          if [ "$DEPLOYED_ANY" != "true" ]; then
            echo "No deploy targets were found in candidates: $TARGETS"
            exit 1
          fi
